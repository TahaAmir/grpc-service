syntax = "proto3";

option go_package = "./proto";

package greet_service;

service  GreetService {
    rpc SayHello(NoParam) returns (HelloResponse);
    rpc SayHelloServerStreaming(NamesList) returns (stream HelloResponse); // gets back stream for server S.Side Stremaing
    rpc SayHelloClientStreaming(stream HelloRequest) returns (MessageList);
    rpc SayHelloBidirectionalStreaming(stream HelloRequest) returns (HelloResponse);

}

message NoParam{};

message HelloResponse{
    string message = 1;
}

message HelloRequest{
    string message =1;
}

message NamesList {
    repeated string names = 1;

}

message MessageList {
    repeated string message = 1;
}